<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond sombre arrondi -->
  <rect width="64" height="64" rx="14" fill="#0d1117"/>

  <!-- Carrosserie du tram -->
  <rect x="8" y="20" width="48" height="26" rx="5" fill="#6abf1a"/>

  <!-- Fenêtres -->
  <rect x="13" y="25" width="10" height="9" rx="2" fill="#0d1117" opacity="0.7"/>
  <rect x="27" y="25" width="10" height="9" rx="2" fill="#0d1117" opacity="0.7"/>
  <rect x="41" y="25" width="10" height="9" rx="2" fill="#0d1117" opacity="0.7"/>

  <!-- Bande blanche (liseré) -->
  <rect x="8" y="36" width="48" height="3" fill="white" opacity="0.25"/>

  <!-- Roues -->
  <circle cx="18" cy="49" r="5" fill="#1a2332"/>
  <circle cx="18" cy="49" r="2.5" fill="#6abf1a"/>
  <circle cx="46" cy="49" r="5" fill="#1a2332"/>
  <circle cx="46" cy="49" r="2.5" fill="#6abf1a"/>

  <!-- Pantographe -->
  <line x1="32" y1="20" x2="26" y2="10" stroke="#6abf1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="10" x2="42" y2="10" stroke="#6abf1a" stroke-width="2.5" stroke-linecap="round"/>
</svg>
